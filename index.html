<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorry Mithi ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#ffdde1;
overflow:hidden;
}

/* Background sorry blocks */

.bg{
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
z-index:0;
}

.block{
position:absolute;
color:rgba(255,255,255,0.25);
font-size:40px;
font-weight:bold;
animation:float 10s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh) rotate(0deg);
}
100%{
transform:translateY(-100vh) rotate(360deg);
}
}

/* Card */

.container{
position:relative;
z-index:1;
background:white;
padding:40px;
border-radius:20px;
width:350px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

h1{
color:#ff4d6d;
margin-bottom:10px;
}

p{
color:#555;
margin-top:10px;
line-height:1.5;
}

.from{
margin-top:20px;
font-weight:bold;
color:#ff4d6d;
}

button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:30px;
background:#ff4d6d;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#ff1e4d;
}

#reply{
margin-top:15px;
font-weight:bold;
color:#28a745;
}

</style>
</head>

<body>

<!-- Background sorry blocks -->

<div class="bg">

<span class="block" style="left:5%; animation-delay:0s;">SORRY</span>
<span class="block" style="left:20%; animation-delay:2s;">SORRY</span>
<span class="block" style="left:35%; animation-delay:4s;">SORRY</span>
<span class="block" style="left:50%; animation-delay:1s;">SORRY</span>
<span class="block" style="left:65%; animation-delay:3s;">SORRY</span>
<span class="block" style="left:80%; animation-delay:5s;">SORRY</span>

</div>

<!-- Apology Card -->

<div class="container">

<h1>I'm Sorry Mithi 😔</h1>

<p>
I never wanted to hurt you.  
You are very special to me and I truly regret what happened.  
Please forgive me and give me another chance.
</p>

<button onclick="forgive()">Forgive Me ❤️</button>

<div id="reply"></div>

<div class="from">
From Subhu to Mithi 💌
</div>

</div>

<script>

function forgive(){
document.getElementById("reply").innerText =
"Thank you Mithi ❤️ I promise to be better.";
}

</script>

</body>
</html>
